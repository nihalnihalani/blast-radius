# One-command Redis (RedisJSON + Search + Bloom) for BLAST-RADIUS.
#   docker compose up -d        -> Redis on :6379 with keyspace notifications enabled
services:
  redis:
    image: redis/redis-stack:latest
    container_name: blast-redis
    ports:
      - "6379:6379"     # Redis
      - "8001:8001"     # RedisInsight UI
    command: >
      redis-stack-server
      --notify-keyspace-events KE$$x
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
